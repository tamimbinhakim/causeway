name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      path:
        description: "Ad-hoc: package path under packages/ (e.g. causeway-auth-jwt). Reads version from pyproject.toml, publishes to PyPI, tags, creates a GitHub release."
        required: true
        type: string

# Default is read-only. release-please needs write, publishers need OIDC.
permissions:
  contents: read

jobs:
  version-guard:
    name: Version guard
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.0.0
        with:
          python-version: "3.13"
      - run: python scripts/check_versions.py

  release-please:
    name: release-please
    if: github.event_name == 'push'
    needs: version-guard
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-pypi:
    name: Publish ${{ matrix.path }} to PyPI
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
    strategy:
      fail-fast: false
      matrix:
        path: ${{ fromJSON(needs.release-please.outputs.paths_released) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v7.1.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.0.0
        with:
          python-version: "3.13"
      - name: Build ${{ matrix.path }}
        working-directory: ${{ matrix.path }}
        run: uv build
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: ${{ matrix.path }}/dist

  publish-ad-hoc:
    name: Publish ${{ inputs.path }} (ad-hoc)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment:
      name: pypi
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v7.1.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.0.0
        with:
          python-version: "3.13"

      - name: Read version
        id: ver
        working-directory: packages/${{ inputs.path }}
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.+)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check version and tag
        run: python scripts/check_versions.py --package packages/${{ inputs.path }} --check-tag-available

      - name: Build
        working-directory: packages/${{ inputs.path }}
        run: uv build

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: packages/${{ inputs.path }}/dist

      - name: Tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NAME="${{ inputs.path }}"
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${NAME}-v${VERSION}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Release of \`$NAME\` $VERSION. See packages/$NAME/CHANGELOG.md." \
            --target main
