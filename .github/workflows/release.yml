name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      package:
        description: "PyPI package to publish, or all to publish every unpublished/current package."
        required: true
        default: all
        type: choice
        options:
          - all
          - causeway
          - causeway-auth-jwt
          - causeway-cache-redis
          - causeway-db-sqlmodel
          - causeway-deploy-docker
          - causeway-deploy-fly
          - causeway-deploy-modal
          - causeway-flags-growthbook
          - causeway-mailer-smtp
          - causeway-observe-sentry
          - causeway-storage-fs
          - causeway-storage-s3
          - causeway-tasks-dramatiq

# Default is read-only. release-please needs write, publishers need OIDC.
permissions:
  contents: read

jobs:
  release-please:
    name: release-please
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-pypi:
    name: Publish ${{ matrix.path }} to PyPI
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
    strategy:
      fail-fast: false
      matrix:
        path: ${{ fromJSON(needs.release-please.outputs.paths_released) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v7.1.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.0.0
        with:
          python-version: "3.13"
      - name: Build ${{ matrix.path }}
        working-directory: ${{ matrix.path }}
        run: |
          rm -rf dist
          uv build
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: ${{ matrix.path }}/dist

  publish-manual:
    name: Publish ${{ matrix.name }} to PyPI
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: causeway, dir: causeway }
          - { name: causeway-auth-jwt, dir: causeway-auth-jwt }
          - { name: causeway-cache-redis, dir: causeway-cache-redis }
          - { name: causeway-db-sqlmodel, dir: causeway-db-sqlmodel }
          - { name: causeway-deploy-docker, dir: causeway-deploy-docker }
          - { name: causeway-deploy-fly, dir: causeway-deploy-fly }
          - { name: causeway-deploy-modal, dir: causeway-deploy-modal }
          - { name: causeway-flags-growthbook, dir: causeway-flags-growthbook }
          - { name: causeway-mailer-smtp, dir: causeway-mailer-smtp }
          - { name: causeway-observe-sentry, dir: causeway-observe-sentry }
          - { name: causeway-storage-fs, dir: causeway-storage-fs }
          - { name: causeway-storage-s3, dir: causeway-storage-s3 }
          - { name: causeway-tasks-dramatiq, dir: causeway-tasks-dramatiq }
    steps:
      - if: inputs.package == 'all' || inputs.package == matrix.name
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - if: inputs.package == 'all' || inputs.package == matrix.name
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v7.1.1
      - if: inputs.package == 'all' || inputs.package == matrix.name
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.0.0
        with:
          python-version: "3.13"

      - if: inputs.package == 'all' || inputs.package == matrix.name
        name: Read package metadata
        id: meta
        run: |
          set -euo pipefail
          PACKAGE_DIR="packages/${{ matrix.dir }}"
          NAME=$(python - "$PACKAGE_DIR/pyproject.toml" <<'PY'
          import sys, tomllib
          print(tomllib.load(open(sys.argv[1], "rb"))["project"]["name"])
          PY
          )
          VERSION=$(python - "$PACKAGE_DIR/pyproject.toml" <<'PY'
          import sys, tomllib
          print(tomllib.load(open(sys.argv[1], "rb"))["project"]["version"])
          PY
          )
          PUBLISHED=$(python - "$NAME" "$VERSION" <<'PY'
          import json, sys, urllib.error, urllib.request

          name, version = sys.argv[1:3]
          try:
              with urllib.request.urlopen(f"https://pypi.org/pypi/{name}/json", timeout=20) as response:
                  releases = json.load(response)["releases"]
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  print("false")
                  raise SystemExit
              raise
          print("true" if version in releases else "false")
          PY
          )
          {
            echo "name=$NAME"
            echo "version=$VERSION"
            echo "tag=${{ matrix.dir }}-v$VERSION"
            echo "published=$PUBLISHED"
          } >> "$GITHUB_OUTPUT"
          if [ "$PUBLISHED" = "true" ]; then
            echo "$NAME==$VERSION is already on PyPI; publish will be skipped."
          fi

      - if: (inputs.package == 'all' || inputs.package == matrix.name) && steps.meta.outputs.published != 'true'
        name: Build ${{ matrix.name }}
        working-directory: packages/${{ matrix.dir }}
        run: |
          rm -rf dist
          uv build

      - if: (inputs.package == 'all' || inputs.package == matrix.name) && steps.meta.outputs.published != 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: packages/${{ matrix.dir }}/dist

      - if: inputs.package == 'all' || inputs.package == matrix.name
        name: Tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_DIR: packages/${{ matrix.dir }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          NAME: ${{ steps.meta.outputs.name }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "$TAG already exists; skipping tag push."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "$TAG release already exists; skipping release create."
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Release of \`$NAME\` $VERSION. See $PACKAGE_DIR/CHANGELOG.md." \
              --target main
          fi
