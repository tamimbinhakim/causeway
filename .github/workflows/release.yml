name: Release

on:
  push:
    branches: [main]

# Default is read-only. release-please needs write, publishers need OIDC.
permissions:
  contents: read

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-pypi:
    name: Publish ${{ matrix.path }} to PyPI
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # `pypi` env scopes the PYPI_API_TOKEN secret and locks deployments to
    # main. Swap to Trusted Publishing (id-token: write, no token) once each
    # PyPI project has a registered publisher.
    environment:
      name: pypi
    strategy:
      fail-fast: false
      # Dynamic matrix — only the packages release-please actually released
      # this cycle get built and published. Empty array short-circuits the job.
      matrix:
        path: ${{ fromJSON(needs.release-please.outputs.paths_released) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v7.1.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.0.0
        with:
          python-version: "3.13"
      - name: Build ${{ matrix.path }}
        working-directory: ${{ matrix.path }}
        run: uv build
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: ${{ matrix.path }}/dist
          password: ${{ secrets.PYPI_API_TOKEN }}
