name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Default: read-only. Per-job permissions narrow further where needed.
permissions:
  contents: read

jobs:
  commitlint:
    name: Lint commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate PR commits
        run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  lint-docs:
    name: Lint docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check:docs

  lint-py:
    name: Lint Python
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v7.1.1
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.0.0
        with:
          python-version: "3.13"
      - working-directory: packages/causeway
        run: |
          uv sync --all-extras --dev
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy src

  test-py:
    name: Test core · ${{ matrix.python }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v7.1.1
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.0.0
        with:
          python-version: ${{ matrix.python }}
      - working-directory: packages/causeway
        run: |
          uv sync --all-extras --dev
          uv run pytest --cov=causeway --cov-report=xml --cov-fail-under=80 -q
      - if: matrix.os == 'ubuntu-latest' && matrix.python == '3.13'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: packages/causeway/coverage.xml
          flags: core
          token: ${{ secrets.CODECOV_TOKEN }}

  test-plugins:
    name: Test plugin · ${{ matrix.plugin }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - causeway-auth-jwt
          - causeway-cache-redis
          - causeway-db-sqlmodel
          - causeway-deploy-docker
          - causeway-deploy-fly
          - causeway-deploy-modal
          - causeway-flags-growthbook
          - causeway-mailer-smtp
          - causeway-observe-sentry
          - causeway-storage-fs
          - causeway-storage-s3
          - causeway-tasks-dramatiq
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v7.1.1
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.0.0
        with:
          python-version: "3.13"
      - name: Test ${{ matrix.plugin }}
        working-directory: packages/${{ matrix.plugin }}
        run: |
          MODULE="${{ matrix.plugin }}"
          MODULE="${MODULE//-/_}"
          uv sync --group dev
          uv run pytest --cov="$MODULE" --cov-report=xml --cov-fail-under=90 -q
      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: packages/${{ matrix.plugin }}/coverage.xml
          flags: plugins
          token: ${{ secrets.CODECOV_TOKEN }}

  test-examples:
    name: Test example · ${{ matrix.example }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        example: [minimal, minimal-crud, blog]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v7.1.1
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.0.0
        with:
          python-version: "3.13"
      - name: Run ${{ matrix.example }}
        working-directory: examples/${{ matrix.example }}
        run: |
          uv sync --dev
          if [ -d tests ]; then
            uv run pytest -q
          else
            uv run python -c "import importlib; importlib.import_module('app.app')"
          fi

  required:
    name: All checks passed
    needs: [lint-docs, lint-py, test-py, test-plugins, test-examples]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Fail if any required job failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - run: echo "All required checks passed."
