[build-system]
requires = ["hatchling>=1.29.0"]
build-backend = "hatchling.build"

[project]
name = "quay-auth-jwt"
version = "0.1.0a0"
description = "JWT bearer-token AuthProvider for Quay."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = ["quay>=0.1.0a0", "pyjwt>=2.9"]

[project.entry-points."quay.plugins"]
auth-jwt = "quay_auth_jwt:plugin"

[tool.hatch.build.targets.wheel]
packages = ["src/quay_auth_jwt"]
