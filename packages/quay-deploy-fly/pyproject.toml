[build-system]
requires = ["hatchling>=1.29.0"]
build-backend = "hatchling.build"

[project]
name = "quay-deploy-fly"
version = "0.1.0a0"
description = "Fly.io deploy target for Quay."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = ["quay>=0.1.0a0"]

[project.entry-points."quay.plugins"]
deploy-fly = "quay_deploy_fly:plugin"

[tool.hatch.build.targets.wheel]
packages = ["src/quay_deploy_fly"]
