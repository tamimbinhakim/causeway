[build-system]
requires = ["hatchling>=1.29.0"]
build-backend = "hatchling.build"

[project]
name = "quay-deploy-modal"
version = "0.1.0a0"
description = "Modal deploy target for Quay."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = ["quay>=0.1.0a0", "modal>=0.65"]

[project.entry-points."quay.plugins"]
deploy-modal = "quay_deploy_modal:plugin"

[tool.hatch.build.targets.wheel]
packages = ["src/quay_deploy_modal"]
