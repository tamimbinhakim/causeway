[build-system]
requires = ["hatchling>=1.29.0"]
build-backend = "hatchling.build"

[project]
name = "causeway"
version = "0.3.8"
description = "A lean backend framework for type-safe Python APIs — file-based routing, typed config/DI, scoped providers, plugin registry, and background tasks."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "Tamim Bin Hakim", email = "tamimbinhakim.work@gmail.com" }]
keywords = [
  "asgi",
  "backend-framework",
  "file-based-routing",
  "dependency-injection",
  "background-tasks",
  "dyadpy",
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Framework :: AsyncIO",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Internet :: WWW/HTTP",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Typing :: Typed",
]

dependencies = [
  "dyadpy>=0.1.1",
  "pydantic-settings>=2.14.1",
  "pydantic>=2.13.4",
  "msgspec>=0.19",
  "starlette>=1.0.0",
  "uvicorn[standard]>=0.47.0",
  "watchfiles>=1.1.1",
  "typer>=0.25.1",
  "rich>=15.0.0",
  "structlog>=25.5.0",
  "anyio>=4.13.0",
]

[project.optional-dependencies]
dramatiq = ["dramatiq[redis]>=2.1.0"]
otel = [
  "opentelemetry-api>=1.41.1",
  "opentelemetry-sdk>=1.41.1",
  "opentelemetry-instrumentation-asgi>=0.62b1",
  "opentelemetry-exporter-otlp-proto-http>=1.41.1",
]
binary = ["nuitka>=2.5"]
all = ["causeway[dramatiq,otel,binary]"]

[project.scripts]
causeway = "causeway.cli:main"

[project.entry-points."causeway.plugins"]
# Reference adapters shipped in core register themselves under this group.

[project.entry-points.pytest11]
causeway = "causeway._pytest_plugin"

[project.urls]
Homepage = "https://github.com/tamimbinhakim/causeway"
Documentation = "https://github.com/tamimbinhakim/causeway/tree/main/docs"
Repository = "https://github.com/tamimbinhakim/causeway"
Issues = "https://github.com/tamimbinhakim/causeway/issues"
Changelog = "https://github.com/tamimbinhakim/causeway/blob/main/packages/causeway/CHANGELOG.md"

[dependency-groups]
dev = [
  "pytest>=9.0.3",
  "pytest-asyncio>=1.3.0",
  "pytest-cov>=7.1.0",
  "httpx>=0.28.1",
  "ruff>=0.15.13",
  "mypy>=2.1.0",
  "types-setuptools",
]

[tool.hatch.build.targets.wheel]
packages = ["src/causeway"]

[tool.hatch.build.targets.sdist]
include = ["/src", "/tests", "/README.md", "/CHANGELOG.md"]

# ---- ruff ----
[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "W",   # pycodestyle / pyflakes
  "I",   # isort
  "B",   # bugbear
  "UP",  # pyupgrade
  "SIM", # simplify
  "C4",  # comprehensions
  "PT",  # pytest
  "RUF", # ruff
  "TID", # tidy imports
  "PYI", # type stubs
  "ANN", # annotations
]
ignore = [
  "ANN401", # allow Any in select cases
  "E501",   # line length handled by formatter
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["ANN", "B017", "PT011", "RUF012"]

[tool.ruff.lint.isort]
known-first-party = ["causeway"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true

# ---- mypy ----
[tool.mypy]
python_version = "3.11"
strict = true
warn_unreachable = true
warn_redundant_casts = true
warn_unused_ignores = true
disallow_any_generics = true
no_implicit_reexport = true
files = ["src/causeway"]

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

# ---- pytest ----
[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = ["-ra", "--strict-markers", "--strict-config"]
filterwarnings = [
  "error",
  # ``BaseHTTPMiddleware`` + ``httpx.ASGITransport`` leaks anyio task-group
  # resources during garbage collection — a known Starlette/anyio interaction
  # that only manifests outside a real ASGI server lifespan. Treat the
  # GC-time unraisable as a soft warning so the suite isn't held hostage by
  # framework internals; real in-test warnings still error.
  "ignore::pytest.PytestUnraisableExceptionWarning",
]

# ---- coverage ----
[tool.coverage.run]
branch = true
source = ["causeway"]
# Test infrastructure (the in-tree pytest plugin, scenario kit, snapshot
# rewriter, fixture loaders) is *exercised* by every test in the suite
# but isn't itself a unit under test — counting its lines against the
# coverage threshold gives a misleadingly low number and creates noise
# whenever the kit gets a new feature. CLI is omitted for the same
# reason: covered indirectly by example projects, not by core tests.
omit = [
  "src/causeway/cli.py",
  "src/causeway/_pytest_plugin.py",
  "src/causeway/_testing/*",
]

[tool.coverage.report]
exclude_lines = ["pragma: no cover", "if TYPE_CHECKING:", "raise NotImplementedError", "\\.\\.\\."]
