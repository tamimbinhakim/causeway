[build-system]
requires = ["hatchling>=1.29.0"]
build-backend = "hatchling.build"

[project]
name = "quay-sqlmodel"
version = "0.1.0a0"
description = "SQLModel / SQLAlchemy DBSession adapter for Quay."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = ["quay>=0.1.0a0", "sqlmodel>=0.0.22", "sqlalchemy[asyncio]>=2.0"]

[project.entry-points."quay.plugins"]
sqlmodel = "quay_sqlmodel:plugin"

[tool.hatch.build.targets.wheel]
packages = ["src/quay_sqlmodel"]
