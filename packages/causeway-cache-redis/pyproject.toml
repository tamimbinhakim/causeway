[build-system]
requires = ["hatchling>=1.29.0"]
build-backend = "hatchling.build"

[project]
name = "causeway-cache-redis"
version = "0.1.0a0"
description = "Redis-backed KV adapter for Causeway."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = ["causeway>=0.1.0a0", "redis>=5.0"]

[project.entry-points."causeway.plugins"]
cache-redis = "causeway_cache_redis:plugin"

[tool.hatch.build.targets.wheel]
packages = ["src/causeway_cache_redis"]
