[build-system]
requires = ["hatchling>=1.29.0"]
build-backend = "hatchling.build"

[project]
name = "causeway-deploy-fly"
version = "0.1.0a0"
description = "Fly.io deploy target for Causeway."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = ["causeway>=0.1.0a0"]

[project.entry-points."causeway.plugins"]
deploy-fly = "causeway_deploy_fly:plugin"

[tool.hatch.build.targets.wheel]
packages = ["src/causeway_deploy_fly"]
