[build-system]
requires = ["hatchling>=1.29.0"]
build-backend = "hatchling.build"

[project]
name = "quay-flags-growthbook"
version = "0.1.0a0"
description = "GrowthBook FeatureFlags adapter for Quay."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = ["quay>=0.1.0a0", "growthbook>=1.0", "httpx>=0.28"]

[project.entry-points."quay.plugins"]
flags-growthbook = "quay_flags_growthbook:plugin"

[tool.hatch.build.targets.wheel]
packages = ["src/quay_flags_growthbook"]
