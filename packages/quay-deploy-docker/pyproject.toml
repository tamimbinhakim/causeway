[build-system]
requires = ["hatchling>=1.29.0"]
build-backend = "hatchling.build"

[project]
name = "quay-deploy-docker"
version = "0.1.0a0"
description = "Docker deploy target: emit a Dockerfile and compose.yaml."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = ["quay>=0.1.0a0"]

[project.entry-points."quay.plugins"]
deploy-docker = "quay_deploy_docker:plugin"

[tool.hatch.build.targets.wheel]
packages = ["src/quay_deploy_docker"]
