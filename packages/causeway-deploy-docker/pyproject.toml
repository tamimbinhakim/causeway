[build-system]
requires = ["hatchling>=1.29.0"]
build-backend = "hatchling.build"

[project]
name = "causeway-deploy-docker"
version = "0.2.0"
description = "Docker deploy target: emit a Dockerfile and compose.yaml."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = ["causeway>=0.1.0"]

[project.entry-points."causeway.plugins"]
deploy-docker = "causeway_deploy_docker:plugin"

[dependency-groups]
dev = [
  "pytest>=9.0.3",
  "pytest-asyncio>=1.3.0",
  "pytest-cov>=7.1.0",
]

[tool.uv.sources]
causeway = { path = "../causeway", editable = true }

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = ["-ra", "--strict-markers", "--strict-config"]

[tool.coverage.run]
branch = true
source = ["causeway_deploy_docker"]

[tool.coverage.report]
exclude_lines = ["pragma: no cover", "if TYPE_CHECKING:", "raise NotImplementedError", "\\.\\.\\."]

[tool.hatch.build.targets.wheel]
packages = ["src/causeway_deploy_docker"]
