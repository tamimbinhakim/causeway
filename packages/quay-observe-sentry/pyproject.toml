[build-system]
requires = ["hatchling>=1.29.0"]
build-backend = "hatchling.build"

[project]
name = "quay-observe-sentry"
version = "0.1.0a0"
description = "Sentry error-tracking integration for Quay."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = ["quay>=0.1.0a0", "sentry-sdk>=2.0"]

[project.entry-points."quay.plugins"]
observe-sentry = "quay_observe_sentry:plugin"

[tool.hatch.build.targets.wheel]
packages = ["src/quay_observe_sentry"]
