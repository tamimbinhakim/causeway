[build-system]
requires = ["hatchling>=1.29.0"]
build-backend = "hatchling.build"

[project]
name = "causeway-db-sqlmodel"
version = "0.5.1"
description = "SQLModel / SQLAlchemy DBSession adapter for Causeway."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = ["causeway>=0.1.0", "sqlmodel>=0.0.22", "sqlalchemy[asyncio]>=2.0"]

[project.entry-points."causeway.plugins"]
sqlmodel = "causeway_db_sqlmodel:plugin"

[dependency-groups]
dev = [
  "pytest>=9.0.3",
  "pytest-asyncio>=1.3.0",
  "pytest-cov>=7.1.0",
  "aiosqlite>=0.20",
  "pydantic>=2.10",
]

[tool.uv.sources]
causeway = { path = "../causeway", editable = true }

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = ["-ra", "--strict-markers", "--strict-config"]

[tool.coverage.run]
branch = true
source = ["causeway_db_sqlmodel"]

[tool.coverage.report]
exclude_lines = ["pragma: no cover", "if TYPE_CHECKING:", "raise NotImplementedError", "\\.\\.\\."]

[tool.hatch.build.targets.wheel]
packages = ["src/causeway_db_sqlmodel"]
