[build-system]
requires = ["hatchling>=1.29.0"]
build-backend = "hatchling.build"

[project]
name = "causeway-db-sqlmodel"
version = "0.1.0a0"
description = "SQLModel / SQLAlchemy DBSession adapter for Causeway."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = ["causeway>=0.1.0a0", "sqlmodel>=0.0.22", "sqlalchemy[asyncio]>=2.0"]

[project.entry-points."causeway.plugins"]
sqlmodel = "causeway_db_sqlmodel:plugin"

[tool.hatch.build.targets.wheel]
packages = ["src/causeway_db_sqlmodel"]
