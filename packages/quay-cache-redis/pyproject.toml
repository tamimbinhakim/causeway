[build-system]
requires = ["hatchling>=1.29.0"]
build-backend = "hatchling.build"

[project]
name = "quay-cache-redis"
version = "0.1.0a0"
description = "Redis-backed KV adapter for Quay."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = ["quay>=0.1.0a0", "redis>=5.0"]

[project.entry-points."quay.plugins"]
cache-redis = "quay_cache_redis:plugin"

[tool.hatch.build.targets.wheel]
packages = ["src/quay_cache_redis"]
