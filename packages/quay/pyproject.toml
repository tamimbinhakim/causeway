[build-system]
requires = ["hatchling>=1.29.0"]
build-backend = "hatchling.build"

[project]
name = "quay"
version = "0.1.0a0"
description = "A lean backend framework for type-safe Python APIs — file-based routing, typed config/DI, scoped providers, plugin registry, and background tasks."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "Tamim Bin Hakim", email = "tamimbinhakim.work@gmail.com" }]
keywords = [
  "asgi",
  "backend-framework",
  "file-based-routing",
  "dependency-injection",
  "background-tasks",
  "dyadpy",
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Framework :: AsyncIO",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Internet :: WWW/HTTP",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Typing :: Typed",
]

dependencies = [
  "dyadpy>=0.1.0a0",
  "pydantic-settings>=2.14.1",
  "pydantic>=2.13.4",
  "msgspec>=0.19",
  "starlette>=1.0.0",
  "uvicorn[standard]>=0.47.0",
  "watchfiles>=1.1.1",
  "typer>=0.25.1",
  "rich>=15.0.0",
  "structlog>=25.5.0",
  "anyio>=4.13.0",
]

[project.optional-dependencies]
dramatiq = ["dramatiq[redis]>=2.1.0"]
otel = [
  "opentelemetry-api>=1.41.1",
  "opentelemetry-sdk>=1.41.1",
  "opentelemetry-instrumentation-asgi>=0.62b1",
  "opentelemetry-exporter-otlp-proto-http>=1.41.1",
]
all = ["quay[dramatiq,otel]"]

[project.scripts]
quay = "quay.cli:main"

[project.entry-points."quay.plugins"]
# Reference adapters shipped in core register themselves under this group.

[project.urls]
Homepage = "https://github.com/tamimbinhakim/quay"
Documentation = "https://github.com/tamimbinhakim/quay/tree/main/docs"
Repository = "https://github.com/tamimbinhakim/quay"
Issues = "https://github.com/tamimbinhakim/quay/issues"
Changelog = "https://github.com/tamimbinhakim/quay/blob/main/packages/quay/CHANGELOG.md"

[dependency-groups]
dev = [
  "pytest>=9.0.3",
  "pytest-asyncio>=1.3.0",
  "pytest-cov>=7.1.0",
  "httpx>=0.28.1",
  "ruff>=0.15.13",
  "mypy>=2.1.0",
  "types-setuptools",
]

[tool.hatch.build.targets.wheel]
packages = ["src/quay"]

[tool.hatch.build.targets.sdist]
include = ["/src", "/tests", "/README.md", "/CHANGELOG.md"]

# ---- ruff ----
[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "W",   # pycodestyle / pyflakes
  "I",   # isort
  "B",   # bugbear
  "UP",  # pyupgrade
  "SIM", # simplify
  "C4",  # comprehensions
  "PT",  # pytest
  "RUF", # ruff
  "TID", # tidy imports
  "PYI", # type stubs
  "ANN", # annotations
]
ignore = [
  "ANN401", # allow Any in select cases
  "E501",   # line length handled by formatter
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["ANN", "B017", "PT011", "RUF012"]

[tool.ruff.lint.isort]
known-first-party = ["quay"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true

# ---- mypy ----
[tool.mypy]
python_version = "3.11"
strict = true
warn_unreachable = true
warn_redundant_casts = true
warn_unused_ignores = true
disallow_any_generics = true
no_implicit_reexport = true
files = ["src/quay"]

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

# ---- pytest ----
[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = ["-ra", "--strict-markers", "--strict-config"]
filterwarnings = ["error"]

# ---- coverage ----
[tool.coverage.run]
branch = true
source = ["quay"]
omit = ["src/quay/cli.py"]

[tool.coverage.report]
exclude_lines = ["pragma: no cover", "if TYPE_CHECKING:", "raise NotImplementedError", "\\.\\.\\."]
