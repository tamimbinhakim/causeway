[build-system]
requires = ["hatchling>=1.29.0"]
build-backend = "hatchling.build"

[project]
name = "causeway-storage-fs"
version = "0.1.0a0"
description = "Disk-backed Storage adapter for Causeway — dev + tests."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = ["causeway>=0.1.0a0"]

[project.entry-points."causeway.plugins"]
storage-fs = "causeway_storage_fs:plugin"

[tool.hatch.build.targets.wheel]
packages = ["src/causeway_storage_fs"]
