[build-system]
requires = ["hatchling>=1.29.0"]
build-backend = "hatchling.build"

[project]
name = "causeway-observe-sentry"
version = "0.5.0"
description = "Sentry error-tracking integration for Causeway."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = ["causeway>=0.1.0", "sentry-sdk>=2.0"]

[project.entry-points."causeway.plugins"]
observe-sentry = "causeway_observe_sentry:plugin"

[dependency-groups]
dev = [
  "pytest>=9.0.3",
  "pytest-asyncio>=1.3.0",
  "pytest-cov>=7.1.0",
  "pydantic>=2.10",
]

[tool.uv.sources]
causeway = { path = "../causeway", editable = true }

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = ["-ra", "--strict-markers", "--strict-config"]

[tool.coverage.run]
branch = true
source = ["causeway_observe_sentry"]

[tool.coverage.report]
exclude_lines = ["pragma: no cover", "if TYPE_CHECKING:", "raise NotImplementedError", "\\.\\.\\."]

[tool.hatch.build.targets.wheel]
packages = ["src/causeway_observe_sentry"]
