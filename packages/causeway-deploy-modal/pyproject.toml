[build-system]
requires = ["hatchling>=1.29.0"]
build-backend = "hatchling.build"

[project]
name = "causeway-deploy-modal"
version = "0.5.0"
description = "Modal deploy target for Causeway."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = ["causeway>=0.1.0", "modal>=0.65"]

[project.entry-points."causeway.plugins"]
deploy-modal = "causeway_deploy_modal:plugin"

[dependency-groups]
dev = [
  "pytest>=9.0.3",
  "pytest-asyncio>=1.3.0",
  "pytest-cov>=7.1.0",
]

[tool.uv.sources]
causeway = { path = "../causeway", editable = true }

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = ["-ra", "--strict-markers", "--strict-config"]

[tool.coverage.run]
branch = true
source = ["causeway_deploy_modal"]

[tool.coverage.report]
exclude_lines = ["pragma: no cover", "if TYPE_CHECKING:", "raise NotImplementedError", "\\.\\.\\."]

[tool.hatch.build.targets.wheel]
packages = ["src/causeway_deploy_modal"]
