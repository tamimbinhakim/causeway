[build-system]
requires = ["hatchling>=1.29.0"]
build-backend = "hatchling.build"

[project]
name = "causeway-mailer-smtp"
version = "0.1.0a0"
description = "SMTP Mailer adapter for Causeway."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = ["causeway>=0.1.0a0", "aiosmtplib>=3.0"]

[project.entry-points."causeway.plugins"]
mailer-smtp = "causeway_mailer_smtp:plugin"

[tool.hatch.build.targets.wheel]
packages = ["src/causeway_mailer_smtp"]
