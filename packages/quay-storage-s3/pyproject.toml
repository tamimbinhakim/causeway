[build-system]
requires = ["hatchling>=1.29.0"]
build-backend = "hatchling.build"

[project]
name = "quay-storage-s3"
version = "0.1.0a0"
description = "S3 / R2 / MinIO storage adapter for Quay."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = ["quay>=0.1.0a0", "aioboto3>=13.0"]

[project.entry-points."quay.plugins"]
storage-s3 = "quay_storage_s3:plugin"

[tool.hatch.build.targets.wheel]
packages = ["src/quay_storage_s3"]
