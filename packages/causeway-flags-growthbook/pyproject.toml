[build-system]
requires = ["hatchling>=1.29.0"]
build-backend = "hatchling.build"

[project]
name = "causeway-flags-growthbook"
version = "0.4.0"
description = "GrowthBook FeatureFlags adapter for Causeway."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = ["causeway>=0.1.0", "growthbook>=1.0", "httpx>=0.28"]

[project.entry-points."causeway.plugins"]
flags-growthbook = "causeway_flags_growthbook:plugin"

[dependency-groups]
dev = [
  "pytest>=9.0.3",
  "pytest-asyncio>=1.3.0",
  "pytest-cov>=7.1.0",
]

[tool.uv.sources]
causeway = { path = "../causeway", editable = true }

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = ["-ra", "--strict-markers", "--strict-config"]

[tool.coverage.run]
branch = true
source = ["causeway_flags_growthbook"]

[tool.coverage.report]
exclude_lines = ["pragma: no cover", "if TYPE_CHECKING:", "raise NotImplementedError", "\\.\\.\\."]

[tool.hatch.build.targets.wheel]
packages = ["src/causeway_flags_growthbook"]
